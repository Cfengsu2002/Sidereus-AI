# 将 frontend/ 部署到 GitHub Pages（满足「前端须公网可访问」）
# 使用前：Repo → Settings → Pages → Build source 选「GitHub Actions」

name: Deploy frontend to GitHub Pages

on:
  push:
    branches: ["main"]
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Optional — inject Railway API URL from secret
        env:
          RAILWAY_PUBLIC_URL: ${{ secrets.RAILWAY_PUBLIC_URL }}
        run: |
          if [ -z "$RAILWAY_PUBLIC_URL" ]; then
            echo "No RAILWAY_PUBLIC_URL secret; deploy with index.html api-base as committed (set meta or add secret later)."
            exit 0
          fi
          python3 << 'PY'
          import os, pathlib, re
          url = os.environ["RAILWAY_PUBLIC_URL"].strip().rstrip("/")
          if not url.startswith("https://"):
              raise SystemExit("RAILWAY_PUBLIC_URL must start with https://")
          path = pathlib.Path("frontend/index.html")
          text = path.read_text(encoding="utf-8")
          text, n = re.subn(
              r'(<meta\s+name="api-base"\s+content=")[^"]*(")',
              lambda m: m.group(1) + url + m.group(2),
              text,
              count=1,
          )
          if n != 1:
              raise SystemExit("Could not find <meta name=\"api-base\" ...> in frontend/index.html")
          path.write_text(text, encoding="utf-8")
          PY

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend

      - uses: actions/deploy-pages@v4
        id: deployment
