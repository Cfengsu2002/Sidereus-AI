<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>简历解析与岗位匹配 · Resume Lab</title>
    <meta
      name="description"
      content="上传 PDF 简历与岗位 JD，一键获取结构化信息与 AI 匹配评分。"
    />
    <!--
      后端公网地址（GitHub Pages / 本地打开静态页时用）。勿带末尾 /。
      若仅在 Railway 同源访问且希望 meta 不占位，可改为 content=""（走同源 /api）。
      本地开发若要连本机 uvicorn，也可临时改为 content="" 。
      CI：可用仓库 Secret RAILWAY_PUBLIC_URL 由 workflow 注入。
    -->
    <meta name="api-base" content="https://sidereus-ai-production.up.railway.app" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="bg-gradient" aria-hidden="true"></div>

    <main class="page">
      <header class="hero">
        <p class="hero__eyebrow">Sidereus AI · Resume Lab</p>
        <h1 class="hero__title">简历解析与岗位匹配</h1>
        <p class="hero__lead">
        </p>
      </header>

      <section class="panel panel--input" aria-labelledby="input-heading">
        <div class="panel__head">
          <h2 id="input-heading" class="panel__title">开始分析</h2>
          <p class="panel__hint">上传简历并粘贴岗位要求（不少于 20 字）。</p>
        </div>

        <div class="form-stack">
          <div class="field">
            <span class="field__label" id="resumeFile-label">简历 PDF</span>
            <label class="file-field" for="resumeFile">
              <input
                id="resumeFile"
                class="file-field__input"
                type="file"
                accept="application/pdf"
                aria-labelledby="resumeFile-label"
              />
              <span class="file-field__icon" aria-hidden="true">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path d="M12 4v12m0 0l4-4m-4 4l-4-4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                  <path d="M4 17v2h16v-2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
              </span>
              <span class="file-field__text">
                <strong>点击选择</strong>
                <span class="file-field__sub">或拖拽 PDF 到此（浏览器支持时）</span>
              </span>
              <span id="fileName" class="file-field__name" data-empty="未选择文件"></span>
            </label>
          </div>

          <div class="field">
            <label class="field__label" for="jobDescription">岗位 JD（≥ 20 字）</label>
            <textarea
              id="jobDescription"
              class="field__control field__control--textarea"
              rows="8"
              placeholder="粘贴岗位职责、必备技能、经验年限、学历要求等完整岗位描述…"
            ></textarea>
          </div>

          <div class="form-actions">
            <button id="analyzeBtn" type="button" class="btn btn--primary">
              <span class="btn__spinner" aria-hidden="true"></span>
              <span class="btn__label">上传并分析</span>
            </button>
            <div id="status" class="status status--muted" role="status" aria-live="polite">
              就绪
            </div>
          </div>
        </div>
      </section>

      <section id="resultsSection" class="results-section" hidden>
        <div id="summaryPanel" class="results-inner"></div>
      </section>

      <section class="panel panel--json" aria-labelledby="json-heading">
        <div class="panel__head panel__head--row">
          <div>
            <h2 id="json-heading" class="panel__title">完整 JSON</h2>
          </div>
          <button id="copyJsonBtn" type="button" class="btn btn--ghost">
            <span class="btn__label">复制 JSON</span>
          </button>
        </div>
        <div class="code-shell">
          <pre id="rawJson" class="code-block" tabindex="0">等待分析…</pre>
        </div>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
